# ============================================================
# DEMO: Deliberately inefficient pipeline for EcoCI demo
# Copy this to a test project as .gitlab-ci.yml
# ============================================================
# Problems planted:
#   1. All :latest images (huge, slow pulls)
#   2. No cache anywhere (reinstalls deps every run)
#   3. No needs: declarations (everything runs sequentially)
#   4. No rules:changes (runs ALL jobs on README changes)
#   5. Heavy runner tags on lightweight jobs
#   6. Duplicate dependency installs across jobs
#   7. No timeout protection
#   8. Full git clone instead of shallow fetch
# ============================================================

stages:
  - lint
  - build
  - test
  - security
  - deploy

variables:
  DOCKER_DRIVER: overlay2

# --- LINT STAGE ---
eslint:
  stage: lint
  image: node:latest
  script:
    - npm install
    - npx eslint src/ --format stylish
  tags:
    - saas-linux-xlarge-amd64

rubocop:
  stage: lint
  image: ruby:latest
  script:
    - gem install rubocop
    - rubocop app/ lib/

python-lint:
  stage: lint
  image: python:latest
  script:
    - pip install flake8 pylint black mypy
    - flake8 src/
    - pylint src/ --disable=C0114,C0115,C0116
    - black --check src/
    - mypy src/

# --- BUILD STAGE ---
build-frontend:
  stage: build
  image: node:latest
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

build-backend:
  stage: build
  image: python:latest
  script:
    - pip install -r requirements.txt
    - python setup.py bdist_wheel
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

build-docs:
  stage: build
  image: python:latest
  script:
    - pip install mkdocs mkdocs-material
    - mkdocs build
  artifacts:
    paths:
      - site/

docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  tags:
    - saas-linux-xlarge-amd64

# --- TEST STAGE ---
unit-tests:
  stage: test
  image: python:latest
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov pytest-xdist
    - pytest tests/unit/ -v --cov=src --cov-report=html
  artifacts:
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

integration-tests:
  stage: test
  image: python:latest
  services:
    - postgres:latest
    - redis:latest
  script:
    - pip install -r requirements.txt
    - pip install pytest
    - pytest tests/integration/ -v
  variables:
    POSTGRES_DB: testdb
    POSTGRES_USER: runner
    POSTGRES_PASSWORD: password

frontend-tests:
  stage: test
  image: node:latest
  script:
    - npm install
    - npm run test -- --coverage
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

e2e-tests:
  stage: test
  image: cypress/included:latest
  script:
    - npm install
    - npx cypress run
  artifacts:
    paths:
      - cypress/screenshots/
      - cypress/videos/
    when: always
  tags:
    - saas-linux-xlarge-amd64

# --- SECURITY STAGE ---
sast:
  stage: security
  image: python:latest
  script:
    - pip install bandit safety
    - bandit -r src/ -f json -o bandit-report.json || true
    - safety check --json > safety-report.json || true
  artifacts:
    paths:
      - bandit-report.json
      - safety-report.json
  tags:
    - saas-linux-xlarge-amd64

dependency-scan:
  stage: security
  image: node:latest
  script:
    - npm install
    - npm audit --json > npm-audit.json || true
  artifacts:
    paths:
      - npm-audit.json

secret-detection:
  stage: security
  image: python:latest
  script:
    - pip install detect-secrets
    - detect-secrets scan > secrets-report.json
  artifacts:
    paths:
      - secrets-report.json

license-check:
  stage: security
  image: python:latest
  script:
    - pip install pip-licenses
    - pip install -r requirements.txt
    - pip-licenses --format=json > license-report.json
  artifacts:
    paths:
      - license-report.json

# --- DEPLOY STAGE ---
deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -X POST "https://api.staging.example.com/deploy"
      -H "Authorization: Bearer $STAGING_TOKEN"
      -d '{"image":"$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"}'
  environment:
    name: staging
    url: https://staging.example.com

deploy-production:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -X POST "https://api.prod.example.com/deploy"
      -H "Authorization: Bearer $PROD_TOKEN"
      -d '{"image":"$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"}'
  environment:
    name: production
    url: https://example.com
  when: manual
  only:
    - main
