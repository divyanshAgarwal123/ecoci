name: "EcoCI Flow"
description: "Multi-agent flow that analyzes GitLab CI/CD pipelines, estimates carbon emissions, generates optimizations, and creates a merge request."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: pipeline_analyzer
      type: AgentComponent
      prompt_id: pipeline_analyzer_prompt
      inputs:
        - "context:goal"
      toolset:
        - "get_project"
        - "get_pipeline_failing_jobs"
        - "get_pipeline_errors"
        - "get_job_logs"
        - "list_repository_tree"
        - "get_repository_file"
        - "read_file"
        - "read_files"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: carbon_calculator
      type: AgentComponent
      prompt_id: carbon_calculator_prompt
      inputs:
        - "context:goal"
        - "context:pipeline_analyzer"
      toolset:
        - "get_pipeline_failing_jobs"
        - "get_job_logs"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: optimization_engine
      type: AgentComponent
      prompt_id: optimization_engine_prompt
      inputs:
        - "context:goal"
        - "context:pipeline_analyzer"
        - "context:carbon_calculator"
      toolset:
        - "get_repository_file"
        - "list_repository_tree"
        - "read_file"
        - "read_files"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

    - name: mr_creator
      type: AgentComponent
      prompt_id: mr_creator_prompt
      inputs:
        - "context:goal"
        - "context:pipeline_analyzer"
        - "context:carbon_calculator"
        - "context:optimization_engine"
      toolset:
        - "create_commit"
        - "create_merge_request"
        - "create_merge_request_note"
        - "get_project"
        - "get_current_user"
        - "get_repository_file"
      ui_log_events:
        - on_agent_final_answer
        - on_tool_execution_success

  prompts:
    - prompt_id: pipeline_analyzer_prompt
      name: "Pipeline Analyzer"
      prompt_template:
        system: |
          You are the EcoCI Pipeline Analyzer. Your job is to gather REAL pipeline data using GitLab tools.

          You MUST make these tool calls (do not skip any):
          1. get_project — get project metadata and default branch
          2. get_repository_file — fetch the .gitlab-ci.yml content
          3. get_pipeline_failing_jobs — get ACTUAL job names, statuses, durations from the latest pipeline
          4. get_job_logs — fetch logs for the 2-3 slowest jobs to see what takes time
          5. get_pipeline_errors — check for recurring failure patterns

          After gathering real data, analyze:
          - Which jobs are slowest (using REAL durations, not guesses)
          - Missing cache configurations (check if install steps appear in logs)
          - Missing needs: declarations (jobs that could run in parallel)
          - Oversized images (:latest or full images)
          - Jobs running on non-code changes (no rules:changes)

          Output structured JSON with:
          - jobs[]: name, actual_duration_seconds, status for each job
          - issues[]: category, severity, job_name, description, evidence_from_logs
          - dag_summary: parallelism_ratio, critical_path_depth, independent_jobs
          - confidence: high/medium/low
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: carbon_calculator_prompt
      name: "Carbon Calculator"
      prompt_template:
        system: |
          You are the EcoCI Carbon Calculator. You calculate carbon emissions from REAL job durations.

          Use the actual durations from the pipeline_analyzer output (NOT estimates).
          Formula per job:
            energy_kwh = (actual_duration_seconds / 3600) × cpu_cores × 0.5
            co2_grams = energy_kwh × 475

          Assume cpu_cores = 2 for standard runners, 4 for tags containing "large" or "gpu".

          If the pipeline_analyzer did not provide real durations, call get_pipeline_failing_jobs yourself.

          Return a markdown table:
          | Job | Duration | Energy (Wh) | CO₂ (g) |
          Plus totals and human-readable comparison:
          "X g CO₂ per run = charging Y smartphones = driving Z meters"
          At N runs/week: "W kg CO₂/year, costing $C at $0.10/pipeline-minute"
        user: |
          Pipeline data with REAL durations:
          {{pipeline_analyzer}}

          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: optimization_engine_prompt
      name: "Optimization Engine"
      prompt_template:
        system: |
          You are the EcoCI Optimization Engine. Generate an optimized .gitlab-ci.yml.

          Use the REAL data from previous steps — reference actual durations and log evidence.
          For each optimization, explain the expected savings based on real numbers:
            "Job 'test' takes 342s. Logs show 180s on pip install. Adding cache saves ~180s."

          Strategies (apply only where evidence supports it):
          1. CACHING: Add cache for package managers if install time appears in logs
          2. PARALLELISM: Add needs: [] for jobs that don't depend on each other
          3. SLIM IMAGES: Replace :latest → :slim or :alpine
          4. SKIP RULES: Add rules:changes for relevant file patterns
          5. RUNNER TAGS: Suggest smaller runners for lint/sast jobs

          Rules: NEVER remove jobs. NEVER change behavior. Only optimize execution.
          Return the COMPLETE optimized .gitlab-ci.yml (not a diff).
          Also return a changes[] list with before/after for each optimization.
        user: |
          Real pipeline data:
          {{pipeline_analyzer}}

          Carbon impact:
          {{carbon_calculator}}

          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: mr_creator_prompt
      name: "MR Creator"
      prompt_template:
        system: |
          You are the EcoCI MR Creator. You MUST create a real merge request using GitLab tools.
          Do NOT just suggest changes — you must execute the tool calls to create the MR.

          Required tool calls (execute all of them):
          1. get_current_user — get your identity
          2. get_project — get the default branch name
          3. create_commit — create branch "ecoci/optimize-pipeline" and commit the optimized .gitlab-ci.yml
             Use action "create" with the full file content from the optimization_engine output
             Set start_branch to the default branch
          4. create_merge_request — open an MR from ecoci/optimize-pipeline to default branch
             Title: "🌱 EcoCI: Optimize pipeline — save Xs, reduce Xg CO₂/run"
             Description must include:
             - Summary of changes with before/after metrics (real numbers)
             - Carbon emissions table from carbon_calculator
             - Estimated annual savings
             - Review checklist
          5. create_merge_request_note — post a carbon dashboard comment on the MR

          You MUST complete all 5 tool calls. The user expects a real MR, not just text.
        user: |
          Pipeline analysis:
          {{pipeline_analyzer}}

          Carbon data:
          {{carbon_calculator}}

          Optimized config:
          {{optimization_engine}}

          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

  routers:
    - from: pipeline_analyzer
      to: carbon_calculator
    - from: carbon_calculator
      to: optimization_engine
    - from: optimization_engine
      to: mr_creator
    - from: mr_creator
      to: end

  flow:
    entry_point: pipeline_analyzer
