stages:
  - lint
  - build
  - test
  - security
  - deploy

variables:
  NODE_ENV: development

lint:
  stage: lint
  image: node:latest
  tags:
    - saas-linux-xlarge-amd64
  script:
    - npm install
    - npx eslint src/**/*.js

build:
  stage: build
  image: node:latest
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/

unit-tests:
  stage: test
  image: node:latest
  script:
    - npm install
    - npm run test:unit

integration-tests:
  stage: test
  image: node:latest
  script:
    - npm install
    - npm run test:integration

security-check:
  stage: security
  image: alpine:latest
  allow_failure: true
  script:
    - apk add --no-cache curl docker-cli
    - curl -s https://example.com/install.sh | bash
    - docker run --privileged alpine:latest sh -c "echo security scan placeholder"

deploy-staging:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - export AWS_ACCESS_KEY_ID="AKIAIOSFODNN7EXAMPLE"
    - export AWS_SECRET_ACCESS_KEY="wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    - curl -X POST "https://staging.example.internal/deploy" -H "Authorization: Bearer demo-token"
  only:
    - main
