name: EcoCI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run module tests
        run: python scripts/test_all_modules.py

      - name: Test CLI
        run: |
          ecoci version
          ecoci dora --deploys 20 --lead 24 --cfr 0.05 --mttr 1
          ecoci cost --duration 300 --jobs 5
          ecoci predict --files "src/main.py,tests/test_main.py" --lines 50
          ecoci tests --changed "src/user.py,README.md" --lang python
          ecoci fix
