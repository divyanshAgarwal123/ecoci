# ──────────────────────────────────────────────────────────────
# EcoCI – GitLab CI/CD configuration
# ──────────────────────────────────────────────────────────────
# Adds the EcoCI optimizer job alongside the hackathon's
# built-in validate-items pipeline.
# ──────────────────────────────────────────────────────────────

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  GITLAB_BASE_URL: "https://gitlab.com"
  CARBON_INTENSITY_KG_PER_KWH: "0.475"
  DEFAULT_RUNNER_CPU_CORES: "2"
  KWH_PER_CORE_HOUR: "0.5"

# ───── EcoCI runner job ───────────────────────────────────────
# Trigger manually via CI/CD > Run pipeline with variables:
#   ECOCI_PROJECT_ID  – numeric project ID to analyze
#   ECOCI_PIPELINE_ID – numeric pipeline ID that completed
#   ECOCI_REF         – branch/tag ref of the completed pipeline
ecoci_runner:
  stage: test
  image: python:3.12-slim
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip
  before_script:
    - pip install -r requirements.txt --quiet
  script:
    - echo "🌱 EcoCI Runner — analyzing pipeline $ECOCI_PIPELINE_ID in project $ECOCI_PROJECT_ID"
    - python -m scripts.ecoci.main
        --project-id "$ECOCI_PROJECT_ID"
        --pipeline-id "$ECOCI_PIPELINE_ID"
        --ref "$ECOCI_REF"
  rules:
    - if: '$ECOCI_PROJECT_ID && $ECOCI_PIPELINE_ID && $ECOCI_REF'
      when: always
    - when: manual
      allow_failure: true
